# This file contains default configuration values and should not be modified.
# To adjust the application configuration, override values in a separate file.

bff.bindAddress = 0.0.0.0
bff.bindPort = 8090
# 该字段为空时，表示不启用访问密钥认证，任何人都可以访问 API；如果设置了访问密钥，则只有提供正确密钥的请求才能访问 API。
bff.security.accessKey =

bff.kernel.host = localhost
bff.kernel.port = 1099
bff.kernel.userName = Alice
bff.kernel.password = xyz

# S7: On-disk project workspace (drafts + scan-triple assets). Created at startup if missing.
bff.workspace.dir = ./data/bff-workspace
# 50 MiB per uploaded asset file. Requests exceeding this limit get HTTP 413.
bff.workspace.assetMaxBytes = 52428800
