openapi: 3.0.3
info:
  title: openTCS BFF API
  description: >-
    Backend-For-Frontend (BFF) HTTP API consumed by the openTCS SPA.
    Bodies of HTTP requests and responses are JSON.
  version: 0.1.0
servers:
  - url: http://localhost:8090
    description: openTCS BFF running on localhost
tags:
  - name: Vehicles
    description: Working with vehicles
  - name: Transport orders
    description: Working with transport orders
  - name: Events
    description: Server-Sent Events (SSE) for real-time object state updates
  - name: Projects
    description: SPA project (draft + assets) CRUD persisted to the BFF workspace
security:
  - ApiKeyAuth: []
paths:
  /api/v1/vehicles:
    get:
      tags:
        - Vehicles
      summary: List all vehicles known to the kernel.
      operationId: listVehicles
      responses:
        '200':
          description: The list of vehicles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/KernelUnavailable'
  /api/v1/vehicles/{name}:
    get:
      tags:
        - Vehicles
      summary: Get a single vehicle by its name.
      operationId: getVehicleByName
      parameters:
        - name: name
          in: path
          required: true
          description: The name of the vehicle.
          schema:
            type: string
      responses:
        '200':
          description: The requested vehicle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No vehicle with the given name exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/KernelUnavailable'
  /api/v1/vehicles/{name}/integrationLevel:
    put:
      tags:
        - Vehicles
      summary: Update a vehicle's integration level.
      description: >-
        Forwards the new integration level to the kernel via
        `VehicleService#updateVehicleIntegrationLevel`. The kernel rejects illegal transitions
        (e.g. lowering the integration level while the vehicle is processing an order) with
        `400 BAD_REQUEST`. The response body is the updated vehicle DTO.
      operationId: updateVehicleIntegrationLevel
      parameters:
        - name: name
          in: path
          required: true
          description: The name of the vehicle.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleIntegrationLevelUpdate'
      responses:
        '200':
          description: The updated vehicle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No vehicle with the given name exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/KernelUnavailable'
  /api/v1/transport-orders:
    post:
      tags:
        - Transport orders
      summary: Create a new transport order.
      description: >-
        Creates a new transport order in the kernel from the given request body. The created order
        is returned with the (possibly server-completed) generated name.
      operationId: createTransportOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransportOrderRequest'
      responses:
        '200':
          description: The transport order has been created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransportOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: A referenced object (intended vehicle, dependency, location...) does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/KernelUnavailable'
  /api/v1/sse:
    get:
      tags:
        - Events
      summary: Subscribe to real-time object events via Server-Sent Events.
      description: >-
        Opens a long-lived `text/event-stream` connection. Each event the BFF receives from the
        kernel is forwarded as a single SSE message whose `event:` field is one of
        `/events/vehicles` or `/events/transportOrders` (matching the openTCS Kernel's
        service-web-api SSE convention) and whose `data:` field is a JSON
        [`SseEventEnvelope`](#/components/schemas/SseEventEnvelope).
        Use the boolean query parameters below to opt in to specific event types; types whose
        parameter is absent or `false` are not sent on the connection.
      operationId: streamEvents
      parameters:
        - name: vehicles
          in: query
          required: false
          description: When `true`, vehicle change events are streamed.
          schema:
            type: boolean
            default: false
        - name: transportOrders
          in: query
          required: false
          description: When `true`, transport-order change events are streamed.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: SSE stream successfully established.
          content:
            text/event-stream:
              schema:
                type: string
                description: A stream of SSE messages (see endpoint description for the payload format).
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/sse/ping:
    get:
      tags:
        - Events
      summary: No-side-effect health probe for the SSE channel.
      description: >-
        Returns a small JSON payload describing the current state of the SSE channel without
        opening a long-lived `text/event-stream` connection. Useful for monitoring and for
        client-side pre-flight checks before opening an `EventSource`.
      operationId: pingSse
      responses:
        '200':
          description: SSE channel state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsePingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List all projects in the BFF workspace.
      operationId: listProjects
      responses:
        '200':
          description: The list of projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Projects]
      summary: Create a new project.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created.
          headers:
            Location:
              schema: { type: string }
              description: Path to the newly created project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Fetch project metadata.
      operationId: getProject
      responses:
        '200':
          description: Project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMeta'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Projects]
      summary: Rename a project.
      operationId: renameProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameProjectRequest'
      responses:
        '200':
          description: Updated project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Delete a project (recursive).
      operationId: deleteProject
      responses:
        '204':
          description: Project deleted.
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/projects/{id}/copy:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Projects]
      summary: Copy ("save as") a project. Copies meta, draft and assets; excludes publish history.
      operationId: copyProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyProjectRequest'
      responses:
        '201':
          description: New project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/projects/{id}/draft:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get the current draft (DraftEnvelope).
      operationId: getProjectDraft
      responses:
        '200':
          description: Draft envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: |
        Replace the current draft. The payload is stored verbatim; only the envelope
        is validated (the integer `version` field must be present).
      operationId: putProjectDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftEnvelope'
      responses:
        '204':
          description: Draft written.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/projects/{id}/assets:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: List uploaded assets.
      operationId: listProjectAssets
      responses:
        '200':
          description: Asset listing.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectAsset'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Projects]
      summary: |
        Upload one or more assets (multipart/form-data, field name `file`).
        Allowed extensions: png, pgm, yaml, yml.
      operationId: uploadProjectAssets
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Created asset descriptors.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectAsset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: Asset exceeds the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/projects/{id}/assets/{name}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - name: name
        in: path
        required: true
        schema: { type: string }
        description: Asset file name (must match `[A-Za-z0-9][A-Za-z0-9_-]{0,127}\.(png|pgm|yaml|yml)`).
    get:
      tags: [Projects]
      summary: Download an asset.
      operationId: getProjectAsset
      responses:
        '200':
          description: The asset bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Delete an asset.
      operationId: deleteProjectAsset
      responses:
        '204':
          description: Asset deleted.
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/plant-models/publish:
    post:
      tags: [PlantModels]
      summary: |
        Publishes a project's current draft to the openTCS kernel. The BFF reads the project's
        on-disk `draft.json` (S7), packs its `payload` into a `PlantModelCreationTO` (no field
        translation — units / enums / Triple shape are already aligned on the SPA side) and calls
        `KernelServicePortal.getPlantModelService().createPlantModel(to)`. When `dryRun=true`,
        only the BFF-side validation runs; the kernel is not contacted.
      operationId: publishPlantModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Publish (or dry-run) succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          description: The kernel could not be reached or the publish call failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Vehicle:
      type: object
      description: A vehicle managed by the openTCS kernel.
      required:
        - name
        - state
        - procState
        - integrationLevel
        - paused
        - energyLevel
      properties:
        name:
          type: string
          description: The unique name of the vehicle.
        state:
          $ref: '#/components/schemas/VehicleState'
        procState:
          $ref: '#/components/schemas/VehicleProcState'
        integrationLevel:
          $ref: '#/components/schemas/VehicleIntegrationLevel'
        paused:
          type: boolean
          description: Whether the vehicle is currently paused.
        energyLevel:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          description: Remaining energy in percent of the maximum.
        currentPosition:
          type: string
          nullable: true
          description: The name of the point the vehicle currently occupies, or null if unknown.
        precisePosition:
          $ref: '#/components/schemas/Triple'
          nullable: true
          description: |
            The vehicle's measured pose position in millimetres, as reported by the
            comm-adapter. Distinct from `currentPosition` (which is the kernel-resolved
            nearest Point name): this field is the raw measured AGV pose used to
            visualise "实测停靠点 vs 最近 Point 距离 vs 容差". `null` if the adapter has
            not reported a precise pose yet.
        orientationAngle:
          type: number
          format: double
          nullable: true
          description: |
            The vehicle's measured orientation in degrees in the range [-360, 360], as
            reported by the comm-adapter. `null` if the adapter has not reported an
            orientation yet (kernel uses `Double.NaN` internally; the BFF normalises
            that to `null`).
    Triple:
      type: object
      description: |
        A 3D position in millimetres (integer). Mirrors the kernel's
        `org.opentcs.data.model.Triple`.
      required:
        - x
        - y
        - z
      properties:
        x:
          type: integer
          format: int64
          description: x in millimetres.
        y:
          type: integer
          format: int64
          description: y in millimetres.
        z:
          type: integer
          format: int64
          description: z in millimetres.
    VehicleState:
      type: string
      description: The vehicle's current state.
      enum:
        - UNKNOWN
        - UNAVAILABLE
        - ERROR
        - IDLE
        - EXECUTING
        - CHARGING
    VehicleProcState:
      type: string
      description: The vehicle's processing state as seen by the dispatcher.
      enum:
        - IDLE
        - AWAITING_ORDER
        - PROCESSING_ORDER
    VehicleIntegrationLevel:
      type: string
      description: The vehicle's integration level.
      enum:
        - TO_BE_IGNORED
        - TO_BE_NOTICED
        - TO_BE_RESPECTED
        - TO_BE_UTILIZED
    VehicleIntegrationLevelUpdate:
      type: object
      description: Request body for `PUT /api/v1/vehicles/{name}/integrationLevel`.
      required:
        - integrationLevel
      properties:
        integrationLevel:
          $ref: '#/components/schemas/VehicleIntegrationLevel'
    ErrorResponse:
      type: object
      description: An error returned by the BFF.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: A machine-readable error code.
        message:
          type: string
          description: A human-readable error description.
        traceId:
          type: string
          nullable: true
          description: >-
            A correlation ID identifying this request in server-side logs. Echoed back in the
            `X-Trace-Id` response header.
        fieldPath:
          type: string
          nullable: true
          description: >-
            For validation errors, points at the offending JSON path inside the request body
            (e.g. `paths[3].srcPointName`). Absent for non-validation errors.
    Destination:
      type: object
      description: A destination of a transport order's drive order.
      required:
        - locationName
        - operation
      properties:
        locationName:
          type: string
          description: The name of the destination location (or point).
        operation:
          type: string
          description: The operation to be performed at the destination.
        properties:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Optional key/value properties attached to the destination.
    TransportOrderRequest:
      type: object
      description: The body for creating a transport order.
      required:
        - name
        - destinations
      properties:
        name:
          type: string
          description: The name of the transport order.
        incompleteName:
          type: boolean
          default: false
          description: >-
            If true, the kernel may complete the given name (e.g. by appending a unique suffix).
        dispensable:
          type: boolean
          default: false
          description: Whether the transport order may be withdrawn by the dispatcher.
        intendedVehicle:
          type: string
          nullable: true
          description: The (optional) name of the vehicle that should execute the order.
        type:
          type: string
          nullable: true
          description: The (optional) type of the transport order. Defaults to "-" if omitted.
        deadline:
          type: string
          format: date-time
          nullable: true
          description: The (optional) deadline by which the order should be completed.
        destinations:
          type: array
          minItems: 1
          description: The destinations to drive to.
          items:
            $ref: '#/components/schemas/Destination'
        dependencies:
          type: array
          nullable: true
          description: The (optional) names of transport orders this order depends on.
          items:
            type: string
        wrappingSequence:
          type: string
          nullable: true
          description: The (optional) name of the wrapping order sequence.
        peripheralReservationToken:
          type: string
          nullable: true
          description: The (optional) reservation token for peripheral devices.
        properties:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Optional key/value properties attached to the order.
    TransportOrder:
      type: object
      description: A transport order managed by the openTCS kernel.
      required:
        - name
        - type
        - state
        - destinations
      properties:
        name:
          type: string
          description: The unique name of the transport order.
        type:
          type: string
          description: The type of the transport order.
        state:
          $ref: '#/components/schemas/TransportOrderState'
        intendedVehicle:
          type: string
          nullable: true
          description: The name of the vehicle intended to execute the order.
        processingVehicle:
          type: string
          nullable: true
          description: >-
            The name of the vehicle that is currently processing this order, or `null` if no
            vehicle has been assigned yet.
        destinations:
          type: array
          description: The destinations of the transport order.
          items:
            $ref: '#/components/schemas/Destination'
    TransportOrderState:
      type: string
      description: >-
        Lifecycle state of a transport order. Mirrors the openTCS Kernel's
        `org.opentcs.data.order.TransportOrder.State` enum.
      enum:
        - RAW
        - ACTIVE
        - DISPATCHABLE
        - BEING_PROCESSED
        - WITHDRAWN
        - FINISHED
        - FAILED
        - UNROUTABLE
    SseEventEnvelope:
      type: object
      description: >-
        Envelope for object-state events sent over the `/api/v1/sse` stream. Both fields may be
        `null`: `currentObjectState` is `null` for object-removed events; `previousObjectState`
        is `null` for object-created events.
      properties:
        currentObjectState:
          description: The object state after the change, or `null` if the object was removed.
          oneOf:
            - $ref: '#/components/schemas/Vehicle'
            - $ref: '#/components/schemas/TransportOrder'
          nullable: true
        previousObjectState:
          description: The object state before the change, or `null` if the object was just created.
          oneOf:
            - $ref: '#/components/schemas/Vehicle'
            - $ref: '#/components/schemas/TransportOrder'
          nullable: true
    SsePingResponse:
      type: object
      description: >-
        Lightweight status payload returned by `GET /api/v1/sse/ping`. Reports the number of
        currently subscribed SSE clients and the set of supported event types.
      required: [ok, connections, supportedEvents, serverTime]
      properties:
        ok:
          type: boolean
          description: Always `true`; included for client-side schema validation symmetry.
        connections:
          type: integer
          format: int32
          minimum: 0
          description: Current number of subscribed SSE clients.
        supportedEvents:
          type: array
          description: SSE event-type names this BFF instance can broadcast.
          items:
            type: string
        serverTime:
          type: integer
          format: int64
          description: Server clock at the time of the response, milliseconds since the Unix epoch.
    ProjectSummary:
      type: object
      required: [id, name, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        updatedAt: { type: string, format: date-time }
        hasDraft: { type: boolean }
    ProjectMeta:
      type: object
      required: [id, name, createdAt, updatedAt, hasDraft, assets]
      properties:
        id: { type: string }
        name: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        hasDraft: { type: boolean }
        assets:
          type: array
          items: { type: string }
        lastPublishedAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            When the draft was last successfully published to the kernel. Absent for projects that
            have never been published (back-compat: pre-S8 meta files don't carry the field).
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        id:
          type: string
          description: Optional project id (must match `^[a-z0-9][a-z0-9_-]{0,63}$`).
    RenameProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
    CopyProjectRequest:
      type: object
      required: [newName]
      properties:
        newName: { type: string }
        newId: { type: string }
    DraftEnvelope:
      type: object
      required: [version, payload]
      description: Opaque draft envelope. The `payload` field is stored verbatim.
      properties:
        version: { type: integer }
        savedAt: { type: string, format: date-time }
        payload:
          type: object
          additionalProperties: true
    ProjectAsset:
      type: object
      required: [name, size, contentType, updatedAt]
      properties:
        name: { type: string }
        size: { type: integer, format: int64 }
        contentType: { type: string }
        updatedAt: { type: string, format: date-time }
    PublishRequest:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
          description: Project id whose `draft.json` should be published.
        modelName:
          type: string
          nullable: true
          description: Optional model name. Defaults to the project's display name (`meta.name`).
        dryRun:
          type: boolean
          default: false
          description: If true, only run BFF-side validation; do not contact the kernel.
    PublishDiff:
      type: object
      description: Summary of the draft contents, returned with every publish / dry-run response.
      required: [points, paths, locationTypes, locations, blocks, vehicles]
      properties:
        points: { type: integer, format: int32 }
        paths: { type: integer, format: int32 }
        locationTypes: { type: integer, format: int32 }
        locations: { type: integer, format: int32 }
        blocks: { type: integer, format: int32 }
        vehicles: { type: integer, format: int32 }
    PublishResponse:
      type: object
      required: [ok, modelName, dryRun, diff]
      properties:
        ok: { type: boolean }
        modelName: { type: string }
        dryRun: { type: boolean }
        publishedAt:
          type: string
          format: date-time
          nullable: true
          description: Set only when `dryRun=false` and the publish succeeded.
        diff:
          $ref: '#/components/schemas/PublishDiff'
  responses:
    BadRequest:
      description: The request body is malformed or fails validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: The request did not provide valid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    KernelUnavailable:
      description: The kernel is currently unreachable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: The request conflicts with the current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Project id (must match `^[a-z0-9][a-z0-9_-]{0,63}$`).
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Access-Key
      description: >-
        Static access key configured via `bff.security.accessKey`. If the configured key is empty,
        no authentication is required and this header is ignored.
